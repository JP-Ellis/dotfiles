#:schema https://json.schemastore.org/any.json
#:tombi schema.strict = false

mode    = "local"
project = ""
shell   = ""

[dirs]
project = []
python  = "isolated"
data    = "~/.local/share/hatch"
cache   = "~/.cache/hatch"

  [dirs.env]
  virtual = ".hatch"

[projects]

[publish]
  [publish.index]
  repo = "main"

[template]
name  = "{{ username }}"
email = "{{ email }}"

[terminal]
  [terminal.styles]
  info    = "bold"
  success = "bold cyan"
  error   = "bold red"
  warning = "bold yellow"
  waiting = "bold magenta"
  debug   = "bold"
  spinner = "simpleDotsScrolling"
