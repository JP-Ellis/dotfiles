# `sheldon` configuration file
# ----------------------------
#
# You can modify this file directly or you can use one of the following
# `sheldon` commands which are provided to assist in editing the config file:
#
# - `sheldon add` to add a new plugin to the config file
# - `sheldon edit` to open up the config file in the default editor
# - `sheldon remove` to remove a plugin from the config file
#
# See the documentation for more
# <https://github.com/rossmacarthur/sheldon#readme>

shell = "zsh"

[templates]
# Use `zsh-defer` to source files once the shell is ready.
# See <https://github.com/romkatv/zsh-defer>
#
# This relies on the `zsh-defer` plugin being loaded first.
defer = """
{{ hooks?.pre | nl }}
{% for file in files %}
    zsh-defer source "{{ file }}"
{% endfor %}
{{ hooks?.post | nl }}
"""

[plugins]
  [plugins.zsh-defer]
  # Must be first — provides zsh-defer for all subsequent plugins
  github = "romkatv/zsh-defer"

  [plugins.zsh-completions]
  github = "zsh-users/zsh-completions"
  apply  = ["defer"]

  [plugins.zsh-autosuggestions]
  github = "zsh-users/zsh-autosuggestions"
  apply  = ["defer"]

  [plugins.fzf-tab]
  # Replaces the default zsh completion menu with fzf.
  # Requires fzf in PATH (provided by mise).
  github = "Aloxaf/fzf-tab"
  apply  = ["defer"]
