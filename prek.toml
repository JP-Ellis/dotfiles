#:schema https://raw.githubusercontent.com/j178/prek/refs/heads/master/prek.schema.json
#:tombi toml-version = "v1.1.0"

default_install_hook_types = ["commit-msg", "pre-commit", "pre-push"]
default_stages             = ["pre-commit", "pre-push"]

# Generic hooks that apply to a lot of files
[[repos]]
repo  = "https://github.com/pre-commit/pre-commit-hooks"
rev   = "v6.0.0"
hooks = [
  { id = "check-added-large-files" },
  { id = "check-case-conflict" },
  { id = "check-executables-have-shebangs" },
  { id = "check-shebang-scripts-are-executable" },
  { id = "check-symlinks" },
  { id = "destroyed-symlinks" },
  { id = "end-of-file-fixer" },
  { id = "mixed-line-ending" },
  { id = "trailing-whitespace" },
  { id = "check-toml" },
  { id = "check-xml" },
  { id = "check-yaml" },
]

[[repos]]
repo  = "https://github.com/lyz-code/yamlfix/"
rev   = "1.19.1"
hooks = [
  { id = "yamlfix", args = ["--config-file=.yamlfix.toml"] },
]

[[repos]]
repo  = "https://github.com/biomejs/pre-commit"
rev   = "v2.4.12"
hooks = [
  { id = "biome-check" },
]

# TOML formatting (tombi replaces taplo)
[[repos]]
repo  = "https://github.com/tombi-toml/tombi-pre-commit"
rev   = "v0.9.9"
hooks = [
  { id = "tombi-format", exclude = '(^|/)Cargo\.lock$' },
  { id = "tombi-lint" },
]

[[repos]]
repo  = "https://github.com/astral-sh/ruff-pre-commit"
rev   = "v0.15.11"
hooks = [
  { id = "ruff", args = ["--fix", "--exit-non-zero-on-fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo  = "https://github.com/crate-ci/committed"
rev   = "v1.1.11"
hooks = [
  { id = "committed" },
]

[[repos]]
repo  = "https://github.com/DavidAnson/markdownlint-cli2"
rev   = "v0.22.0"
hooks = [
  { id = "markdownlint-cli2" },
]

[[repos]]
repo  = "https://github.com/crate-ci/typos"
rev   = "v1.45.1"
hooks = [
  { id = "typos" },
]

[[repos]]
repo  = "https://github.com/koalaman/shellcheck-precommit"
rev   = "v0.11.0"
hooks = [
  { id = "shellcheck", args = ["--external-sources"] },
]

[[repos]]
repo  = "https://github.com/scop/pre-commit-shfmt"
rev   = "v3.12.0-2"
hooks = [
  { id = "shfmt" },
]

[[repos]]
repo  = "local"
hooks = [
  {
    id       = "pwsh-lint",
    name     = "pwsh lint",
    language = "system",
    types    = ["powershell"],
    entry    = "pwsh -CommandWithArgs \"$args | % { Invoke-ScriptAnalyzer -Settings PSGallery -Recurse -ReportSummary -EnableExit -Path $_ }\"",
  },
  {
    id       = "pwsh-format",
    name     = "pwsh format",
    language = "system",
    types    = ["powershell"],
    entry    = "pwsh -CommandWithArgs \"$args | % { Invoke-Formatter -Settings PSGallery $_ }\"",
  },
]
